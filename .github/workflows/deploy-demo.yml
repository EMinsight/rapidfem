name: Deploy site

# Builds two static sites and deploys them as a single GitHub Pages
# deployment (fem.rapidpassives.org):
#
#   /        the static notebook demo  (SvelteKit, VITE_STATIC_MODE=1)
#   /docs    the documentation site    (docs-site/, SvelteKit, BASE_PATH=/docs)
#
# The demo example outputs in
# `python/python_src/rapidfem/ui/frontend-src/static/demo/` are pre-baked
# LOCALLY by `python scripts/bake_demo.py` and checked into git, so CI never
# runs gmsh + the FEM solver. Re-bake locally + commit when an example changes.
#
# The docs API reference is extracted fresh in CI by `docs-site/scripts/build.py`
# (griffe static analysis — RapidFEM itself is not installed).

on:
  push:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: deploy-site
  cancel-in-progress: false

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    name: Build demo + docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          # Full history + tags — the docs build extracts the API for every
          # released tag via throwaway git worktrees.
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Build demo (static mode)
        working-directory: python/python_src/rapidfem/ui/frontend-src
        env:
          VITE_STATIC_MODE: '1'
        run: |
          npm ci
          npm run build

      - name: Extract API documentation
        working-directory: docs-site
        run: |
          pip install -r scripts/requirements.txt
          python scripts/build.py

      - name: Build docs site
        working-directory: docs-site
        env:
          BASE_PATH: /docs
        run: |
          npm ci
          npm run build

      - name: Assemble site (demo at root, docs under /docs)
        run: |
          site=python/python_src/rapidfem/ui/frontend/dist
          mkdir -p "$site/docs"
          cp -r docs-site/build/. "$site/docs/"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: python/python_src/rapidfem/ui/frontend/dist

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
