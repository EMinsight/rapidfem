name: Deploy site

# Builds the unified RapidFEM web app (landing + notebook demo + API
# reference) with VITE_STATIC_MODE=1 and deploys it to GitHub Pages
# (fem.rapidpassives.org).
#
# The notebook example outputs in
# `python/python_src/rapidfem/ui/frontend-src/static/demo/` are pre-baked
# LOCALLY by `python scripts/bake_demo.py` and checked into git, so CI never
# runs gmsh + the FEM solver.
#
# The API reference is extracted fresh in CI by `scripts/api_ref/build.py`
# (griffe static analysis — RapidFEM itself is not installed).

on:
  push:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: deploy-site
  cancel-in-progress: false

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    name: Build site
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          # Full history + tags — the API extraction materialises every
          # released tag in a throwaway git worktree.
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Extract API reference
        run: |
          pip install -r scripts/api_ref/requirements.txt
          python scripts/api_ref/build.py

      - name: Build site (static mode)
        working-directory: python/python_src/rapidfem/ui/frontend-src
        env:
          VITE_STATIC_MODE: '1'
        run: |
          npm ci
          npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: python/python_src/rapidfem/ui/frontend/dist

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
