name: CI

on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  rust:
    name: cargo build + test (workspace)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      # The Rust solver crates. rapidfem-python is a pyo3 cdylib built by
      # maturin, not plain cargo, so it is excluded here.
      - name: Build
        run: cargo build --workspace --exclude rapidfem-python

      # Element-level accuracy and math-kernel checks only (fast, no real
      # geometry). The DGTD validation suite (rapidfem-td) runs full
      # transient solves on meshes - far too slow for CI; run it locally
      # with `cargo test -p rapidfem-td`. The Build step above still
      # compile-checks rapidfem-td.
      - name: Test
        run: cargo test --release -p rapidfem-core -p rapidfem-fd
