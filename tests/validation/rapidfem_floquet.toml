[mesh]
file = "tests/meshes/parallel_plate.msh"

[frequency]
range = [8.0e9, 12.0e9, 9]

# FloquetPort at z=0 face, TE polarized along y (φ=90° rotates Ey to Ex... wait,
# mode field: Ex = -sin(φ), Ey = cos(φ). For Ey component we need φ=0.)
[[ports]]
type = "floquet"
tag = 3
scan_theta_deg = 0.0
scan_phi_deg = 0.0
mode_nr = 1     # TE / S-pol

[[ports]]
type = "floquet"
tag = 4
scan_theta_deg = 0.0
scan_phi_deg = 0.0
mode_nr = 1

[[ports]]
type = "pmc"
tag = 2

[pec]
tags = [1]

[output]
touchstone = "tests/validation/rapidfem_floquet.s2p"
