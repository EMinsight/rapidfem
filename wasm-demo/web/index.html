<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>rapidfem — WR-90 Browser Demo</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 760px; margin: 2em auto; padding: 0 1em; color: #222; }
    h1 { font-size: 1.4em; margin-bottom: 0.2em; }
    .sub { color: #666; margin-bottom: 1.2em; }
    button { padding: 0.5em 1em; font-size: 1em; cursor: pointer; }
    button:disabled { cursor: progress; opacity: 0.6; }
    canvas { display: block; border: 1px solid #ccc; margin-top: 1em; background: #fafafa; }
    pre { background: #f3f3f3; padding: 0.6em 0.9em; font-size: 0.85em; overflow-x: auto; }
    .ok { color: #060; }
    .err { color: #a00; }
  </style>
</head>
<body>
  <h1>rapidfem — in-browser FEM</h1>
  <div class="sub">FEM-solved S-parameters computed entirely in your browser via WebAssembly. Pick an example and hit Run.</div>

  <label for="example">Example: </label>
  <select id="example">
    <option value="wr90">WR-90 waveguide (9–11 GHz)</option>
    <option value="microstrip">Sky130 microstrip (1–6 GHz)</option>
    <option value="spiral">Sky130 octagonal spiral inductor (1–100 GHz, captures SRF)</option>
  </select>
  <button id="run" style="margin-left: 0.5em;">Run sweep</button>
  <span id="status" style="margin-left: 1em;"></span>

  <canvas id="plot" width="720" height="320"></canvas>

  <pre id="log"></pre>

  <script type="module">
  (async () => {
    // Cache-bust the WASM glue + binary on every page load. Without this,
    // browsers happily serve a stale .wasm even after a "hard" refresh.
    const BUILD = Date.now();
    const mod = await import(`../pkg/rapidfem_wasm.js?v=${BUILD}`);
    const init = mod.default;
    const run_sweep = mod.run_sweep;
    // Ensure the actual .wasm binary is also fetched fresh.
    const WASM_URL = `../pkg/rapidfem_wasm_bg.wasm?v=${BUILD}`;

    const log = (msg, cls = "") => {
      const el = document.getElementById("log");
      el.textContent += (cls ? `[${cls}] ` : "") + msg + "\n";
    };

    const plotS = (freqs_hz, s11, s21) => {
      const c = document.getElementById("plot");
      const ctx = c.getContext("2d");
      ctx.clearRect(0, 0, c.width, c.height);

      const xMin = Math.min(...freqs_hz), xMax = Math.max(...freqs_hz);
      const yMin = 0, yMax = 1.05;
      const padL = 50, padR = 14, padT = 14, padB = 28;
      const W = c.width - padL - padR, H = c.height - padT - padB;
      const xT = f => padL + ((f - xMin) / (xMax - xMin)) * W;
      const yT = v => padT + (1 - (v - yMin) / (yMax - yMin)) * H;

      // axes + gridlines
      ctx.strokeStyle = "#ddd";
      ctx.lineWidth = 1;
      for (let v = 0; v <= 1.0; v += 0.2) {
        ctx.beginPath(); ctx.moveTo(padL, yT(v)); ctx.lineTo(padL + W, yT(v)); ctx.stroke();
        ctx.fillStyle = "#666"; ctx.font = "11px sans-serif";
        ctx.fillText(v.toFixed(1), 14, yT(v) + 4);
      }
      ctx.fillStyle = "#666";
      for (let i = 0; i <= 4; i++) {
        const f = xMin + ((xMax - xMin) * i) / 4;
        ctx.fillText((f / 1e9).toFixed(2) + " GHz", xT(f) - 22, padT + H + 18);
      }
      ctx.strokeStyle = "#333"; ctx.lineWidth = 1;
      ctx.strokeRect(padL, padT, W, H);

      const drawTrace = (vals, color, label, labelX) => {
        ctx.strokeStyle = color; ctx.lineWidth = 2;
        ctx.beginPath();
        for (let i = 0; i < freqs_hz.length; i++) {
          const x = xT(freqs_hz[i]), y = yT(vals[i]);
          if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
        }
        ctx.stroke();
        ctx.fillStyle = color; ctx.font = "13px sans-serif";
        ctx.fillText(label, labelX, padT + 16);
      };

      drawTrace(s21, "#1565c0", "|S21|", padL + W - 56);
      drawTrace(s11, "#c62828", "|S11|", padL + W - 120);
    };

    const EXAMPLES = {
      wr90: { msh: "./wr90_straight.msh", toml: "./wr90.toml",
              label: "WR-90 waveguide", extractLC: false },
      microstrip: { msh: "./microstrip.msh", toml: "./microstrip.toml",
                    label: "Sky130 microstrip", extractLC: true },
      spiral: { msh: "./spiral.msh", toml: "./spiral.toml",
                label: "Sky130 spiral inductor", extractLC: true },
    };

    function inv2x2(m) {
      // m is [[a,b],[c,d]] of complex {re,im}
      const a = m[0][0], b = m[0][1], c = m[1][0], d = m[1][1];
      const det = cMul(a, d); cSub(det, cMul(b, c));
      const D = { re: a.re*d.re - a.im*d.im - (b.re*c.re - b.im*c.im),
                  im: a.re*d.im + a.im*d.re - (b.re*c.im + b.im*c.re) };
      const inv = (z) => {
        const m2 = z.re*z.re + z.im*z.im;
        return { re: z.re/m2, im: -z.im/m2 };
      };
      const Di = inv(D);
      const neg = (z) => ({ re: -z.re, im: -z.im });
      return [
        [ cMul(d, Di), cMul(neg(b), Di) ],
        [ cMul(neg(c), Di), cMul(a, Di) ],
      ];
    }
    function cMul(a, b) { return { re: a.re*b.re - a.im*b.im, im: a.re*b.im + a.im*b.re }; }
    function cSub(a, b) { return { re: a.re-b.re, im: a.im-b.im }; }
    function cAdd(a, b) { return { re: a.re+b.re, im: a.im+b.im }; }

    // Z = sqrt(z0) (I + S) (I - S)^-1 sqrt(z0)
    function sToZ(S, z0) {
      const I = [[{re:1,im:0},{re:0,im:0}],[{re:0,im:0},{re:1,im:0}]];
      const IpS = [[cAdd(I[0][0], S[0][0]), cAdd(I[0][1], S[0][1])],
                   [cAdd(I[1][0], S[1][0]), cAdd(I[1][1], S[1][1])]];
      const ImS = [[cSub(I[0][0], S[0][0]), cSub(I[0][1], S[0][1])],
                   [cSub(I[1][0], S[1][0]), cSub(I[1][1], S[1][1])]];
      const ImSinv = inv2x2(ImS);
      const matMul2 = (A, B) => [
        [ cAdd(cMul(A[0][0],B[0][0]), cMul(A[0][1],B[1][0])),
          cAdd(cMul(A[0][0],B[0][1]), cMul(A[0][1],B[1][1])) ],
        [ cAdd(cMul(A[1][0],B[0][0]), cMul(A[1][1],B[1][0])),
          cAdd(cMul(A[1][0],B[0][1]), cMul(A[1][1],B[1][1])) ],
      ];
      const Z = matMul2(IpS, ImSinv);
      return [
        [{re:Z[0][0].re*z0, im:Z[0][0].im*z0}, {re:Z[0][1].re*z0, im:Z[0][1].im*z0}],
        [{re:Z[1][0].re*z0, im:Z[1][0].im*z0}, {re:Z[1][1].re*z0, im:Z[1][1].im*z0}],
      ];
    }

    document.getElementById("run").addEventListener("click", async () => {
      const btn = document.getElementById("run");
      const status = document.getElementById("status");
      const sel = document.getElementById("example").value;
      const ex = EXAMPLES[sel];
      btn.disabled = true; status.textContent = "loading WASM…";
      try {
        await init({ module_or_path: WASM_URL });
        status.textContent = `fetching ${ex.label}…`;
        const meshBytes = new Uint8Array(await (await fetch(ex.msh)).arrayBuffer());
        const configToml = await (await fetch(ex.toml)).text();

        status.textContent = "solving (this may take a few seconds)…";
        const t0 = performance.now();
        const result = run_sweep(meshBytes, configToml);
        const dt = ((performance.now() - t0) / 1000).toFixed(2);

        const n_freq = result.frequencies_hz.length;
        const n_driven = result.n_driven;
        const stride = n_driven * n_driven * 2;
        const s11 = new Array(n_freq);
        const s21 = new Array(n_freq);
        // Per-frequency 2x2 complex S-matrix (for L extraction)
        const Smats = [];
        for (let k = 0; k < n_freq; k++) {
          const off = k * stride;
          const get = (obs, exc) => ({
            re: result.sparams_flat[off + 2*(obs*n_driven + exc)],
            im: result.sparams_flat[off + 2*(obs*n_driven + exc) + 1],
          });
          const S = n_driven >= 2
            ? [[get(0,0), get(0,1)], [get(1,0), get(1,1)]]
            : null;
          Smats.push(S);
          s11[k] = Math.hypot(get(0,0).re, get(0,0).im);
          s21[k] = n_driven >= 2 ? Math.hypot(get(1,0).re, get(1,0).im) : 0;
        }

        plotS(result.frequencies_hz, s11, s21);
        log(`[${ex.label}] solved ${n_freq} frequencies in ${dt}s (FEM-side ${result.solve_time_s.toFixed(3)}s)`, "OK");
        log(`max |S11| = ${Math.max(...s11).toExponential(3)}, min |S21| = ${Math.min(...s21).toFixed(4)}`);

        if (ex.extractLC && n_driven >= 2 && Smats[0]) {
          // Extract L at the LOWEST frequency where the device is purely
          // inductive (Im(Y21) > 0). Self-resonance: |S21| dips when the
          // inductor's L-C tank tank goes parallel-resonant.
          const k0 = 0;
          const omega = 2 * Math.PI * result.frequencies_hz[k0];
          const Z = sToZ(Smats[k0], 50.0);
          const Y = inv2x2(Z);
          const L_pH = 1e12 / (omega * Y[1][0].im);
          const C_fF = 2e15 * (Y[0][0].im + Y[1][0].im) / omega;
          // Quality factor at port 1: Q = Im(Z11)/Re(Z11) (positive when inductive)
          const Q = Z[0][0].im / Z[0][0].re;
          log(`extracted at ${(result.frequencies_hz[k0]/1e9).toFixed(2)} GHz: ` +
              `L = ${L_pH.toFixed(1)} pH, C_total = ${C_fF.toFixed(2)} fF, Q = ${Q.toFixed(1)}`);
          // Find self-resonance from |S21| minimum (or where Im(Y21) flips sign)
          let kSRF = -1;
          for (let k = 1; k < n_freq; k++) {
            const Yk = inv2x2(sToZ(Smats[k], 50.0));
            if (Yk[1][0].im < 0) { kSRF = k; break; }
          }
          if (kSRF > 0) {
            // Linear interp between kSRF-1 and kSRF for Im(Y21)=0
            const f0 = result.frequencies_hz[kSRF - 1];
            const f1 = result.frequencies_hz[kSRF];
            const Y0 = inv2x2(sToZ(Smats[kSRF - 1], 50.0))[1][0].im;
            const Y1 = inv2x2(sToZ(Smats[kSRF], 50.0))[1][0].im;
            const fSRF = f0 + (f1 - f0) * Y0 / (Y0 - Y1);
            log(`self-resonance ≈ ${(fSRF/1e9).toFixed(1)} GHz (Im(Y21) sign-flip)`);
          } else {
            log(`no SRF in sweep — extend frequency range`);
          }
        }

        status.innerHTML = '<span class="ok">done</span>';
      } catch (e) {
        log("ERROR: " + e, "err");
        status.innerHTML = '<span class="err">failed</span>';
        console.error(e);
      } finally {
        btn.disabled = false;
      }
    });
  })();
  </script>
</body>
</html>
